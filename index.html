<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projeto Aurora</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(180deg, #050816, #101b3d);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

.aurora {
    padding: 30px;
}

h1 {
    font-size: 50px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px #00ffff;
}

.contador {
    font-size: 35px;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 20px;
}

.luz {
    width: 300px;
    height: 80px;
    background: linear-gradient(90deg,#00ff99,#00ffff,#8a2be2);
    filter: blur(35px);
    margin: 40px auto;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="aurora">

<h1>🌌 Aurora</h1>

<div class="luz"></div>

<div class="contador">
00 dias : 00 horas : 00 minutos : 00 segundos
</div>

</div>

</body>
</html>
